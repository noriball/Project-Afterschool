name: Generate Archive
on:
  workflow_dispatch:
  schedule:
    # JST の朝・昼・夜。朝の号は UTC では前日に走るので、日付は必ず JST で採る。
    # 分が 0/15/30/45 だと世界中の cron と競合して数時間遅れるため、半端な分に逃がしてある。
    - cron: '17 23 * * *'  # 08:17 JST
    - cron: '37 3 * * *'   # 12:37 JST
    - cron: '43 12 * * *'  # 21:43 JST

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Archive Generator
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add archives/
          git commit -m "chore: add generated archive" || echo "No changes to commit"
          git push

      # 投稿の失敗でアーカイブまで巻き添えにしないよう、コミット後に独立させる
      - name: Post to Bluesky
        continue-on-error: true
        env:
          BLUESKY_IDENTIFIER: ${{ secrets.BLUESKY_IDENTIFIER }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
        run: python post_to_bluesky.py
