name: Generate Archive
on:
  workflow_dispatch:
    inputs:
      post:
        description: 'Bluesky に投稿する（トーン確認だけなら false）'
        type: boolean
        default: true
  schedule:
    # JST 7時〜23時に約3時間おき。朝の号は UTC では前日に走るので、日付は必ず JST で採る。
    # 分が 0/15/30/45 だと世界中の cron と競合して数時間遅れるため、半端な分に散らしてある。
    - cron: '13 22 * * *'  # 07:13 JST
    - cron: '27 1 * * *'   # 10:27 JST
    - cron: '41 4 * * *'   # 13:41 JST
    - cron: '53 7 * * *'   # 16:53 JST
    - cron: '37 10 * * *'  # 19:37 JST
    - cron: '19 13 * * *'  # 22:19 JST

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Archive Generator
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add archives/
          git commit -m "chore: add generated archive" || echo "No changes to commit"
          git push

      # 投稿の失敗でアーカイブまで巻き添えにしないよう、コミット後に独立させる
      - name: Post to Bluesky
        if: ${{ github.event_name == 'schedule' || inputs.post }}
        continue-on-error: true
        env:
          BLUESKY_IDENTIFIER: ${{ secrets.BLUESKY_IDENTIFIER }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
        run: python post_to_bluesky.py
